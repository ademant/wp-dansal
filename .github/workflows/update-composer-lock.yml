name: Update composer.lock

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update'
        required: true
        default: 'main'

permissions:
  contents: write

jobs:
  update-lock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup PHP and Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Install dependencies (update lock)
        run: |
          composer --version
          composer update --no-interaction --with-all-dependencies

      - name: Commit and push composer.lock if changed
        env:
          BRANCH: ${{ github.event.inputs.branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add composer.lock || true
          if ! git diff --staged --quiet; then
            git commit -m "chore(ci): update composer.lock (automated)" || true
            git push origin "$BRANCH"
          else
            echo "No changes to composer.lock"
          fi
        shell: bash
