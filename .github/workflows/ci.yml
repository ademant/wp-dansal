name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  php-lint:
    name: PHP lint (${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Lint PHP files
        run: find . -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 -P4 php -l

  phpcs:
    name: PHPCS (WordPress Coding Standards)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPCS
        run: vendor/bin/phpcs

  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-phpunit-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Configure wp-tests-config
        env:
          WP_TESTS_DIR: ${{ github.workspace }}/vendor/wp-phpunit/wp-phpunit
        run: |
          cp "$WP_TESTS_DIR/wp-tests-config-sample.php" "$WP_TESTS_DIR/wp-tests-config.php"
          sed -i "s|youremptytestdbnamehere|wordpress_test|" "$WP_TESTS_DIR/wp-tests-config.php"
          sed -i "s|yourusernamehere|root|" "$WP_TESTS_DIR/wp-tests-config.php"
          sed -i "s|yourpasswordhere|root|" "$WP_TESTS_DIR/wp-tests-config.php"
          sed -i "s|localhost|127.0.0.1|" "$WP_TESTS_DIR/wp-tests-config.php"

      - name: Run PHPUnit
        env:
          WP_TESTS_DIR: ${{ github.workspace }}/vendor/wp-phpunit/wp-phpunit
        run: vendor/bin/phpunit

  plugin-check:
    name: WordPress plugin-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The wordpress/plugin-check-action bootstraps a WP install, drops
      # the plugin into wp-content/plugins/, activates plugin-check, and
      # runs `wp plugin-check` against it. Errors fail the job; warnings
      # (categories: general, security, plugin_repo) are surfaced but do
      # not fail CI until the codebase is warning-clean.
      - name: Run plugin-check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: './'

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
