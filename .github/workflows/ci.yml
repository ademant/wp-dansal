name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  php-lint:
    name: PHP lint (${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Lint PHP files
        run: find . -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 -P4 php -l

  phpcs:
    name: PHPCS (WordPress Coding Standards)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPCS
        run: vendor/bin/phpcs

  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-phpunit-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Configure wp-tests-config
        env:
          WP_TESTS_DIR: ${{ github.workspace }}/vendor/wp-phpunit/wp-phpunit
        run: |
          set -euo pipefail
          # Write the config inline rather than hunting for a sample file in the
          # vendored package (which may or may not ship one, depending on the
          # release) or curl-ing an unpinned upstream URL.
          mkdir -p "$WP_TESTS_DIR"
          cat > "$WP_TESTS_DIR/wp-tests-config.php" <<'PHP'
          <?php
          define( 'ABSPATH', __DIR__ . '/' );
          define( 'WP_DEFAULT_THEME', 'default' );
          define( 'DB_NAME', 'wordpress_test' );
          define( 'DB_USER', 'root' );
          define( 'DB_PASSWORD', 'root' );
          define( 'DB_HOST', '127.0.0.1' );
          define( 'DB_CHARSET', 'utf8' );
          define( 'DB_COLLATE', '' );
          $table_prefix = 'wptests_';
          define( 'WP_TESTS_DOMAIN', 'example.org' );
          define( 'WP_TESTS_EMAIL', 'admin@example.org' );
          define( 'WP_TESTS_TITLE', 'Test Blog' );
          define( 'WP_PHP_BINARY', 'php' );
          define( 'WPLANG', '' );
          PHP

      - name: Run PHPUnit
        env:
          WP_TESTS_DIR: ${{ github.workspace }}/vendor/wp-phpunit/wp-phpunit
        run: vendor/bin/phpunit

  plugin-check:
    name: WordPress plugin-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Stage the plugin the same way `make zip` does — only the files that
      # actually ship in a release get checked. Otherwise plugin-check flags
      # .editorconfig / phpcs.xml.dist / phpunit.xml.dist as "hidden" or
      # "application" files even though the release zip excludes them.
      - name: Stage plugin release layout
        run: make build

      - name: Run plugin-check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: './build/wp-dansal'

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-zip:
    name: Build plugin zip
    needs: [php-lint, phpcs, phpunit, plugin-check, secrets]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Only tag pushes must match the header — a workflow_dispatch build is
      # allowed to run against arbitrary refs so we can smoke-test the zip.
      - name: Verify tag matches plugin header version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          header_version="$(make --silent version)"
          echo "tag: $tag_version"
          echo "header: $header_version"
          if [ -z "$tag_version" ] || [ -z "$header_version" ]; then
            echo "::error::Empty tag or header version (tag='$tag_version' header='$header_version')."
            exit 1
          fi
          if [ "$tag_version" != "$header_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match wp-dansal.php Version header ($header_version)."
            exit 1
          fi

      - name: Build zip
        run: make zip

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: wp-dansal-plugin-zip
          path: dist/wp-dansal-*.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/wp-dansal-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
